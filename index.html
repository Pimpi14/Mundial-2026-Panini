<html lang="es">

<meta property="og:title" content="Panini Mundial 2026 – Mi Álbum Digital (992 cromos)">

<meta property="og:type" content="website">

<meta name="theme-color" content="#0a0e1a">

<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #243050;
    --accent: #e8b84b;
    --accent2: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --r: 10px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #0f1a2e, #1a2a4a 50%, #0f1a2e);
    border-bottom: 2px solid var(--accent);
    padding: 12px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), #fff 60%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    flex-shrink: 0;
  }

  .logo span {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hs {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    flex: 1;
    justify-content: flex-end;
  }

  .sp {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 4px 11px;
    font-size: .78rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .dg { background: var(--green); }
  .dr { background: var(--red); }
  .da { background: var(--accent); }

  .pw {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px;
  }

  .pbg {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  .pbf {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .pl {
    font-size: .7rem;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
  }

  .ctrl {
    padding: 9px 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 55px;
    z-index: 90;
  }

  .sw {
    flex: 1;
    min-width: 140px;
    position: relative;
  }

  .sw input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: .82rem;
    padding: 6px 9px 6px 28px;
    outline: none;
    transition: all 0.2s ease;
  }

  .sw input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
  }

  .si {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: .8rem;
  }

  .fb {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: .74rem;
    font-weight: 600;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .fb:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .fb.on {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .grp {
    font-size: .65rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    padding: 10px 10px 4px;
    text-transform: uppercase;
  }

  .leg {
    display: flex;
    gap: 9px;
    flex-wrap: wrap;
    padding: 5px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: .68rem;
    color: var(--muted);
    align-items: center;
  }

  .lb {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    border: 1px solid;
    display: inline-block;
  }

  main {
    padding: 9px 9px 80px;
    max-width: 960px;
    margin: 0 auto;
  }

  .ts {
    margin-bottom: 6px;
    border-radius: var(--r);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .ts.complete {
    border-color: #22c55e55;
  }

  .ts.hidden { display: none; }

  .th {
    background: var(--card);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    transition: background .2s;
  }

  .th:hover {
    background: #1f2d46;
  }

  .flag-img {
    width: 24px;
    height: 16px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .tn {
    font-weight: 700;
    font-size: .86rem;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tc {
    font-size: .63rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .tpm {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: .7rem;
    font-weight: 600;
  }

  .mb {
    width: 48px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .mf {
    height: 100%;
    background: var(--accent2);
    border-radius: 99px;
    transition: width .4s;
  }

  .ts.complete .mf {
    background: var(--green);
  }

  .chev {
    font-size: .7rem;
    color: var(--muted);
    transition: transform .25s;
  }

  .ts.open .chev {
    transform: rotate(180deg);
  }

  .sg {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
    gap: 5px;
    padding: 8px;
    background: var(--surface);
  }

  .ts.open .sg {
    display: grid;
  }

  .sk {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 3px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    background: var(--bg);
    min-height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    position: relative;
  }

  .sk:hover {
    border-color: var(--accent);
    transform: scale(1.05);
    z-index: 1;
  }

  .sk.owned {
    background: #0d2e1a;
    border-color: #22c55e88;
  }

  .sk.owned::after {
    content: '✓';
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: .56rem;
    color: var(--green);
    font-weight: 700;
  }

  .sk.rep {
    background: #1a1f0d;
    border-color: #84cc1688;
  }

  .sk.rep::after {
    content: '×2';
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: .54rem;
    color: #84cc16;
    font-weight: 700;
  }

  .sn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .86rem;
    color: var(--muted);
    line-height: 1;
  }

  .sk.owned .sn,
  .sk.rep .sn {
    color: var(--text);
  }

  .sl {
    font-size: .52rem;
    color: var(--muted);
    line-height: 1.2;
    word-break: break-word;
    text-align: center;
  }

  .st {
    background: linear-gradient(90deg, var(--accent), #f59e0b);
    color: #000;
    font-size: .46rem;
    font-weight: 700;
    border-radius: 3px;
    padding: 1px 3px;
  }

  .ctx {
    position: fixed;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 4px 0;
    z-index: 999;
    box-shadow: 0 8px 24px #000a;
    min-width: 138px;
  }

  .ctx div {
    padding: 6px 12px;
    font-size: .78rem;
    cursor: pointer;
    transition: background .15s;
  }

  .ctx div:hover {
    background: var(--border);
  }

  .toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 30px;
    padding: 7px 16px;
    font-size: .78rem;
    font-weight: 600;
    z-index: 9999;
    transition: transform .3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 480px) {
    .logo { font-size: 1.15rem; }
    .sg { grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); }
    .flag-img { width: 20px; height: 14px; }
  }
</style>

const TOTAL = ALBUM.reduce((a, t) => a + t.stickers.length, 0);
const KEY = 'panini-wc26-v11';
let state = {};
try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { }
const save = () => localStorage.setItem(KEY, JSON.stringify(state));
const get = id => state[id] || 0;
const set = (id, v) => { if (v === 0) delete state[id]; else state[id] = v; save(); };

function stats() { let o = 0, r = 0; Object.values(state).forEach(v => { if (v >= 1) o++; if (v === 2) r++; }); return { o, r, m: TOTAL - o }; }
function updateStats() {
  const { o, r, m } = stats();
  document.getElementById('so').textContent = o;
  document.getElementById('sm').textContent = m;
  document.getElementById('sr').textContent = r;
  const pct = Math.round(o / TOTAL * 1000) / 10;
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('pl').textContent = `${o} / ${TOTAL} cromos (${pct}%)`;
}

let filter = 'all', expanded = false;
function render() {
  const mc = document.getElementById('mc');
  mc.innerHTML = '';
  const q = document.getElementById('qi').value.toLowerCase().trim();
  let lastGrp = '';

  ALBUM.forEach(team => {
    const o = team.stickers.filter(s => get(s.id) >= 1).length;
    const total = team.stickers.length;
    const pct = Math.round(o / total * 100);
    const complete = o === total;
    const nm = !q || team.name.toLowerCase().includes(q) || team.code.toLowerCase().includes(q);
    const sm = !q || team.stickers.some(s => s.label.toLowerCase().includes(q) || s.id.toLowerCase().includes(q));

    if (!nm && !sm) return;
    if (filter === 'missing' && o === total) return;
    if (filter === 'owned' && o === 0) return;
    if (filter === 'rep' && !team.stickers.some(s => get(s.id) === 2)) return;

    if (!q && team.grupo && team.grupo !== lastGrp) {
      lastGrp = team.grupo;
      const gl = document.createElement('div');
      gl.className = 'grp';
      gl.textContent = team.grupo === 'Intro' ? '— INTRODUCCIÓN —' : team.grupo === 'Especiales' ? '— SECCIONES ESPECIALES —' : '— GRUPO ' + team.grupo + ' —';
      mc.appendChild(gl);
    }

    const sec = document.createElement('div');
    sec.className = 'ts' + (complete ? ' complete' : '');
    sec.dataset.code = team.code;

    const flagHTML = team.flag ? `<img src="${team.flag}" class="flag-img" alt="${team.code}" loading="lazy">` : '';

    sec.innerHTML = `<div class="th">
      <span class="tn">${flagHTML}${team.name}</span>
      <span class="tc">${team.code}</span>
      <div class="tpm">
        <div class="mb"><div class="mf" style="width:${pct}%"></div></div>
        <span style="color:${complete ? 'var(--green)' : 'var(--muted)'}">${o}/${total}</span>
      </div>
      <span class="chev">▼</span>
    </div><div class="sg"></div>`;

    const grid = sec.querySelector('.sg');
    team.stickers.forEach(s => {
      const st = get(s.id);
      if (filter === 'missing' && st > 0) return;
      if (filter === 'owned' && st === 0) return;
      if (filter === 'rep' && st !== 2) return;
      if (q && !nm && !s.label.toLowerCase().includes(q) && !s.id.toLowerCase().includes(q)) return;

      const el = document.createElement('div');
      el.className = 'sk' + (st === 1 ? ' owned' : st === 2 ? ' rep' : '');
      el.innerHTML = `<span class="sn">${s.id}</span>${s.foil ? '<span class="st">FOIL</span>' : s.isPhoto ? '<span class="st" style="background:linear-gradient(90deg,#3b82f6,#6366f1)">FOTO</span>' : ''}<span class="sl">${s.label}</span>`;

      el.addEventListener('click', () => { const c = get(s.id), n = c === 0 ? 1 : 0; set(s.id, n); el.className = 'sk' + (n === 1 ? ' owned' : ''); toast(n === 1 ? '✅ ¡Conseguido!' : '❌ Eliminado'); rH(sec); updateStats(); });
      el.addEventListener('dblclick', e => { e.preventDefault(); const c = get(s.id), n = c === 2 ? 1 : 2; set(s.id, n); el.className = 'sk' + (n === 2 ? ' rep' : ' owned'); toast(n === 2 ? '🔁 Repetido' : '✅ Repetido quitado'); rH(sec); updateStats(); });
      el.addEventListener('contextmenu', e => showCtx(e, s.id, el, sec));
      grid.appendChild(el);
    });

    sec.querySelector('.th').addEventListener('click', () => sec.classList.toggle('open'));
    if (expanded || (q && sm && !nm)) sec.classList.add('open');
    mc.appendChild(sec);
  });

  updateStats();
}

function rH(sec) {
  const t = ALBUM.find(x => x.code === sec.dataset.code); if (!t) return;
  const o = t.stickers.filter(s => get(s.id) >= 1).length, total = t.stickers.length;
  sec.classList.toggle('complete', o === total);
  const mf = sec.querySelector('.mf'), sp = sec.querySelector('.tpm span');
  if (mf) mf.style.width = Math.round(o / total * 100) + '%';
  if (sp) { sp.textContent = `${o}/${total}`; sp.style.color = o === total ? 'var(--green)' : 'var(--muted)'; }
}

const ctx = document.getElementById('ctx');
function showCtx(e, id, el, sec) {
  e.preventDefault();
  ctx.innerHTML = '<div data-v="1">✅ Tengo este cromo</div><div data-v="0">❌ Me falta</div><div data-v="2">🔁 Tengo repetido</div>';
  ctx.style.left = Math.min(e.clientX, window.innerWidth - 148) + 'px';
  ctx.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
  ctx.style.display = 'block';
  ctx.querySelectorAll('div').forEach(d => d.addEventListener('click', () => { const v = parseInt(d.dataset.v); set(id, v); el.className = 'sk' + (v === 1 ? ' owned' : v === 2 ? ' rep' : ''); rH(sec); updateStats(); ctx.style.display = 'none'; }));
}

document.addEventListener('click', () => ctx.style.display = 'none');
let tt;
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 1600); }
document.querySelectorAll('.fb[data-f]').forEach(b => b.addEventListener('click', () => { filter = b.dataset.f; document.querySelectorAll('.fb[data-f]').forEach(x => x.classList.remove('on')); b.classList.add('on'); render(); }));
document.getElementById('bex').addEventListener('click', () => { expanded = !expanded; document.getElementById('bex').textContent = expanded ? 'Colapsar todo' : 'Expandir todo'; render(); });
document.getElementById('brs').addEventListener('click', () => { if (!confirm('¿Seguro que quieres borrar todo tu progreso?')) return; state = {}; save(); render(); toast('🗑 Reiniciado'); });
document.getElementById('qi').addEventListener('input', render);
render();
</script>
</body>
</html>
