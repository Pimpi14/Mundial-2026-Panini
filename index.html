<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Álbum</title>
<style>
  body { background:#0a0e1a; color:#e2e8f0; font-family:sans-serif; padding:10px; }
  .sk { display:inline-block; width:60px; height:60px; margin:4px; border:1px solid #fff; text-align:center; vertical-align:top; cursor:pointer; }
  .sk.owned { background:#0d2e1a; }
  .sk.rep { background:#1a1f0d; }
  button { margin:5px; padding:5px 10px; background:#1a2235; color:#e2e8f0; border:1px solid #fff; border-radius:8px; cursor:pointer; }
  .grp { font-weight:bold; margin-top:15px; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#e8b84b; color:#000; padding:7px 15px; border-radius:20px; font-weight:bold; display:none; }
  .toast.show { display:block; }
</style>
</head>
<body>
<h1 style="color:#e8b84b;">PANINI MUNDIAL 2026™ - Test</h1>
<button onclick="diagnosticar()">🔍 Diagnosticar</button>
<div id="mc"></div>
<div class="toast" id="toast"></div>

<script>
// Datos de ejemplo: 3 equipos con 3 cromos cada uno
const ALBUM = [
  { code:'MEX', name:'Mexico', grupo:'A', stickers:[
    {id:'MEX1',label:'BADGE'},{id:'MEX2',label:'LUIS MALAGÓN'},{id:'MEX3',label:'JOHAN VÁSQUEZ'}
  ]},
  { code:'KOR', name:'Korea Republic', grupo:'A', stickers:[
    {id:'KOR1',label:'BADGE'},{id:'KOR2',label:'HYEONWOO JO'},{id:'KOR3',label:'SEUNGGYU KIM'}
  ]},
  { code:'CZE', name:'Czechia', grupo:'A', stickers:[
    {id:'CZE1',label:'BADGE'},{id:'CZE2',label:'MATĚJ KOVÁŘ'},{id:'CZE3',label:'JINDŘICH STANĚK'}
  ]}
];

let state = {};

function loadLocal() {
  const saved = localStorage.getItem('test-album');
  if (saved) {
    try { state = JSON.parse(saved); } catch(e) {}
  }
}

function saveLocal() { localStorage.setItem('test-album', JSON.stringify(state)); }

function get(id) { return state[id] || 0; }
function set(id, v) {
  if (v === 0) delete state[id];
  else state[id] = v;
  saveLocal();
}

function render() {
  const mc = document.getElementById('mc');
  mc.innerHTML = '';
  let lastGrp = '';

  ALBUM.forEach(team => {
    if (team.grupo !== lastGrp) {
      lastGrp = team.grupo;
      const gl = document.createElement('div');
      gl.className = 'grp';
      gl.textContent = '— GRUPO ' + team.grupo + ' —';
      mc.appendChild(gl);
    }

    const sec = document.createElement('div');
    sec.textContent = team.name;
    sec.style.fontWeight = 'bold';
    mc.appendChild(sec);

    team.stickers.forEach(s => {
      const st = get(s.id);
      const el = document.createElement('div');
      el.className = 'sk' + (st === 1 ? ' owned' : st === 2 ? ' rep' : '');
      el.textContent = s.label;
      el.addEventListener('click', () => {
        let currentStatus = 0;
        if (el.classList.contains('owned')) currentStatus = 1;
        else if (el.classList.contains('rep')) currentStatus = 2;
        const newStatus = (currentStatus + 1) % 3;
        el.classList.remove('owned', 'rep');
        if (newStatus === 1) el.classList.add('owned');
        else if (newStatus === 2) el.classList.add('rep');
        set(s.id, newStatus);
        toast(newStatus === 1 ? '✅' : newStatus === 2 ? '🔁' : '❌');
      });
      mc.appendChild(el);
    });
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1000);
}

function diagnosticar() {
  try {
    loadLocal();
    render();
    toast('Carga OK');
  } catch(e) {
    document.getElementById('mc').textContent = 'Error: ' + e.message;
  }
}

// Auto-cargar
window.addEventListener('DOMContentLoaded', () => {
  diagnosticar();
});
</script>
</body>
</html>
