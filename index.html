<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini Mundial 2026 – Mi Álbum Digital</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>
<body>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey:"AIzaSyB...",
  authDomain:"panini-mundial-2026-53d4c.firebaseapp.com",
  projectId:"panini-mundial-2026-53d4c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ================= VARIABLES =================
const SYNC_ID_KEY='panini-sync-id';
const KEY_LOCAL='panini-wc26-local';

let selfState={};
let state={};
let syncId=null;
let unsubscribe=null;
let isOnline=false;

// ================= LOCAL =================
function loadLocal(){
  const s=localStorage.getItem(KEY_LOCAL);
  if(s){
    try{
      selfState=JSON.parse(s);
      state={...selfState};
    }catch(e){}
  }
}

function saveLocal(){
  localStorage.setItem(KEY_LOCAL,JSON.stringify(selfState));
}

// ================= SYNC =================
async function initSync(){
  syncId=localStorage.getItem(SYNC_ID_KEY);

  if(!syncId){
    syncId=Math.random().toString(36).substring(2,8).toUpperCase();
    localStorage.setItem(SYNC_ID_KEY,syncId);
  }

  await auth.signInAnonymously();
  listenToCloud();
}

function listenToCloud(){
  if(unsubscribe)unsubscribe();

  unsubscribe=db.collection('albums').doc(syncId).onSnapshot(doc=>{
    if(doc.exists){

      const cloud=doc.data().stickers||{};

      // ✅ CLAVE: reemplazar completamente
      selfState={...cloud};

      saveLocal();
      state={...selfState};

      render();
      isOnline=true;

    } else {
      pushToCloud();
      isOnline=true;
    }
  },()=>{isOnline=false;});
}

function pushToCloud(){
  if(!syncId)return;

  // ✅ CLAVE: SIN MERGE
  db.collection('albums').doc(syncId).set({
    stickers:selfState,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  });
}

// ================= LÓGICA CROMOS =================
function toggleSticker(id){
  const cur=selfState[id]||0;
  const next=(cur+1)%3;

  if(next===0){
    delete selfState[id];
  }else{
    selfState[id]=next;
  }

  saveLocal();
  state={...selfState};

  if(isOnline)pushToCloud();

  render();
}

// ================= DEMO SIMPLE =================
const stickers=["1","2","3","4","5"];

function render(){
  document.body.innerHTML=stickers.map(id=>{
    const s=selfState[id]||0;
    return `<div onclick="toggleSticker('${id}')" style="
      margin:10px;
      padding:20px;
      border:1px solid #ccc;
      cursor:pointer;
      background:${s===0?'#222':s===1?'green':'orange'};
      color:white;
    ">
      Cromo ${id} → ${s===0?'No tengo':s===1?'Tengo':'Repetido'}
    </div>`;
  }).join('');
}

// ================= INIT =================
loadLocal();
initSync();
render();

</script>

</body>
</html>
