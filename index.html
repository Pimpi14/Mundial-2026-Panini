<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --card: #1a2235; --border: #243050;
    --accent: #e8b84b; --accent2: #3b82f6; --green: #22c55e; --red: #ef4444;
    --text: #e2e8f0; --muted: #64748b; --r: 10px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; }
  header {
    background:linear-gradient(135deg,#0f1a2e,#1a2a4a 50%,#0f1a2e);
    border-bottom:2px solid var(--accent); padding:12px 14px;
    position:sticky; top:0; z-index:100; display:flex;
    align-items:center; gap:10px; flex-wrap:wrap;
  }
  .logo {
    font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:2px;
    background:linear-gradient(90deg,var(--accent),#fff 60%,var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; line-height:1; flex-shrink:0;
  }
  .logo span { background:linear-gradient(90deg,var(--accent2),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .hs { display:flex; gap:7px; flex-wrap:wrap; flex:1; justify-content:flex-end; align-items:center; }
  .sp {
    background:var(--card); border:1px solid var(--border); border-radius:30px;
    padding:4px 11px; font-size:.78rem; font-weight:600;
    display:flex; align-items:center; gap:5px; white-space:nowrap;
  }
  .dot { width:7px; height:7px; border-radius:50%; }
  .dg { background:var(--green); } .dr { background:var(--red); } .da { background:var(--accent); }

  .sync-bar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:6px 14px; display:flex; align-items:center; gap:8px;
    font-size:.72rem; flex-wrap:wrap;
  }
  .sync-code {
    background:var(--card); border:1px solid var(--accent); border-radius:15px;
    padding:3px 10px; font-weight:700; color:var(--accent);
    font-family:monospace; letter-spacing:1px; cursor:pointer;
  }
  .sync-btn {
    background:var(--card); border:1px solid var(--border); border-radius:var(--r);
    color:var(--text); font-family:'Outfit',sans-serif; font-size:.68rem;
    font-weight:600; padding:4px 8px; cursor:pointer; transition:all .2s;
  }
  .sync-btn:hover { border-color:var(--accent); color:var(--accent); }
  .sync-status { display:flex; align-items:center; gap:4px; font-size:.65rem; color:var(--muted); }
  .sync-dot { width:6px; height:6px; border-radius:50%; }
  .sync-dot.online { background:var(--green); }
  .sync-dot.offline { background:var(--red); }
  .view-selector {
    background:var(--card); border:1px solid var(--border); border-radius:15px;
    padding:2px 8px; font-size:.7rem; display:flex; align-items:center; gap:4px;
  }
  .view-selector select {
    background:transparent; border:none; color:var(--text); font-family:'Outfit',sans-serif;
    font-size:.7rem; font-weight:600; outline:none; cursor:pointer;
  }
  .match-badge {
    background:var(--accent); color:#000; border-radius:10px; padding:1px 6px;
    font-size:.6rem; font-weight:700;
  }

  .pw { background:var(--card); border-bottom:1px solid var(--border); padding:7px 14px; }
  .pbg { background:var(--border); border-radius:99px; height:6px; overflow:hidden; }
  .pbf { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:99px; transition:width .5s; }
  .pl { font-size:.7rem; color:var(--muted); margin-top:4px; text-align:right; }

  .ctrl {
    padding:9px 12px; display:flex; gap:6px; flex-wrap:wrap; align-items:center;
    background:var(--surface); border-bottom:1px solid var(--border);
    position:sticky; top:120px; z-index:90;
  }
  .sw { flex:1; min-width:140px; position:relative; }
  .sw input {
    width:100%; background:var(--card); border:1px solid var(--border);
    border-radius:var(--r); color:var(--text); font-family:'Outfit',sans-serif;
    font-size:.82rem; padding:6px 9px 6px 28px; outline:none; transition:all .2s;
  }
  .sw input:focus { border-color:var(--accent2); }
  .si { position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.8rem; }

  .fb {
    background:var(--card); border:1px solid var(--border); border-radius:var(--r);
    color:var(--text); font-family:'Outfit',sans-serif; font-size:.74rem;
    font-weight:600; padding:5px 10px; cursor:pointer; transition:all .2s; white-space:nowrap;
  }
  .fb:hover { border-color:var(--accent); color:var(--accent); }
  .fb.on { background:var(--accent); color:#000; border-color:var(--accent); }
  .fb:disabled { opacity:0.4; cursor:not-allowed; }

  .grp { font-size:.65rem; font-weight:700; color:var(--muted); letter-spacing:2px; padding:10px 10px 4px; text-transform:uppercase; }
  .leg { display:flex; gap:9px; flex-wrap:wrap; padding:5px 12px; background:var(--surface); border-bottom:1px solid var(--border); font-size:.68rem; color:var(--muted); align-items:center; }
  .lb { width:10px; height:10px; border-radius:3px; border:1px solid; display:inline-block; }

  main { padding:9px 9px 80px; max-width:960px; margin:0 auto; }

  .ts { margin-bottom:6px; border-radius:var(--r); border:1px solid var(--border); overflow:hidden; }
  .ts.complete { border-color:#22c55e55; } .ts.hidden { display:none; }
  .th { background:var(--card); padding:8px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; transition:background .2s; }
  .th:hover { background:#1f2d46; }
  .flag-img { width:24px; height:16px; border-radius:2px; object-fit:cover; flex-shrink:0; }
  .tn { font-weight:700; font-size:.86rem; flex:1; display:flex; align-items:center; gap:8px; }
  .tc { font-size:.63rem; color:var(--muted); font-weight:600; letter-spacing:1px; }
  .tpm { display:flex; align-items:center; gap:5px; font-size:.7rem; font-weight:600; }
  .mb { width:48px; height:4px; background:var(--border); border-radius:99px; overflow:hidden; }
  .mf { height:100%; background:var(--accent2); border-radius:99px; transition:width .4s; }
  .ts.complete .mf { background:var(--green); }
  .chev { font-size:.7rem; color:var(--muted); transition:transform .25s; }
  .ts.open .chev { transform:rotate(180deg); }

  .sg { display:none; grid-template-columns:repeat(auto-fill,minmax(62px,1fr)); gap:5px; padding:8px; background:var(--surface); }
  .ts.open .sg { display:grid; }

  .sk { border:1px solid var(--border); border-radius:6px; padding:5px 3px; text-align:center; cursor:pointer; transition:all .15s; background:var(--bg); min-height:56px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; position:relative; }
  .sk:hover { border-color:var(--accent); transform:scale(1.05); z-index:1; }
  .sk.owned { background:#0d2e1a; border-color:#22c55e88; }
  .sk.owned::after { content:'✓'; position:absolute; top:2px; right:4px; font-size:.56rem; color:var(--green); font-weight:700; pointer-events:none; }
  .sk.rep { background:#1a1f0d; border-color:#84cc1688; }
  .sk.rep::after { content:'×2'; position:absolute; top:2px; right:4px; font-size:.54rem; color:#84cc16; font-weight:700; pointer-events:none; }
  .sk.wished { border-style:dashed; border-color:var(--accent); }
  .sk.interchangeable {
    border-color: #10b981 !important;
    border-style: dashed !important;
    background: #0a2e1a;
  }
  .sk.interchangeable::before {
    content: '🔄';
    position: absolute;
    top: 2px;
    left: 4px;
    font-size: .5rem;
    pointer-events:none;
  }
  .sn { font-family:'Bebas Neue',sans-serif; font-size:.86rem; color:var(--muted); line-height:1; }
  .sk.owned .sn, .sk.rep .sn { color:var(--text); }
  .sl { font-size:.52rem; color:var(--muted); line-height:1.2; word-break:break-word; text-align:center; }
  .st { background:linear-gradient(90deg,var(--accent),#f59e0b); color:#000; font-size:.46rem; font-weight:700; border-radius:3px; padding:1px 3px; }

  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--card); border:1px solid var(--accent); border-radius:30px; padding:7px 16px; font-size:.78rem; font-weight:600; z-index:9999; transition:transform .3s; pointer-events:none; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:10000; display:flex; align-items:center; justify-content:center; }
  .modal { background:var(--surface); border:1px solid var(--accent); border-radius:var(--r); padding:20px; max-width:400px; width:90%; text-align:center; }
  .modal h3 { margin-bottom:12px; color:var(--accent); }
  .modal input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text); padding:8px 12px; font-family:monospace; font-size:1.2rem; text-align:center; letter-spacing:3px; margin:10px 0; outline:none; }
  .modal input:focus { border-color:var(--accent); }
  .modal button { background:var(--accent); color:#000; border:none; border-radius:var(--r); padding:8px 20px; font-weight:700; cursor:pointer; margin:5px; }
  .modal button.cancel { background:var(--card); color:var(--text); border:1px solid var(--border); }

  @media (max-width:480px) {
    .logo { font-size:1.15rem; }
    .sg { grid-template-columns:repeat(auto-fill,minmax(50px,1fr)); }
    .flag-img { width:20px; height:14px; }
  }
</style>
</head>
<body>

  <button class="sync-btn" id="btnLink">👥 Vincular otro álbum</button>

<header>

  <div class="hs">

</div>

<div class="leg">
  <strong style="color:var(--text)">1 clic</strong> cambia: No tengo → Lo tengo → Repetido &nbsp;|&nbsp;

  <span><span class="lb" style="background:var(--bg);border-color:var(--border)"></span> No lo tengo</span>
</div>

<main id="mc"><div style="text-align:center;padding:40px;">Cargando álbum...</div></main>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalLink" style="display:none;">
  <div class="modal">
    <h3>👥 Vincular otro álbum</h3>
    <p style="font-size:.8rem;color:var(--muted);">Introduce el código del álbum de tu padre:</p>
    <input type="text" id="linkCode" maxlength="8" placeholder="EJ: ABC123">
    <br>
    <button onclick="linkDevice()">Vincular</button>
    <button class="cancel" onclick="closeModal('modalLink')">Cancelar</button>
  </div>
</div>

<script>
// ================== CONFIGURACIÓN DE FIREBASE ================
const firebaseConfig = {
  apiKey: "AIzaSyBtlBxfWT0QDSQ0W1_82D0zCpiCZD4yuwE",
  authDomain: "panini-mundial-2026-53d4c.firebaseapp.com",
  projectId: "panini-mundial-2026-53d4c",
  storageBucket: "panini-mundial-2026-53d4c.firebasestorage.app",
  messagingSenderId: "899949264065",
  appId: "1:899949264065:web:8fc51d817a5eef7418e840"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ============ CAPTURA DE ERRORES GLOBAL ============
window.addEventListener('error', function(e) {
  const statusText = document.getElementById('syncText');
  if (statusText) statusText.textContent = 'Error: ' + e.message;
});

// ============ VARIABLES GLOBALES ============
const SYNC_ID_KEY = 'panini-sync-id';
const KEY_LOCAL = 'panini-wc26-local';
const LINKED_KEY = 'panini-linked';
let state = {};
let selfState = {};
let linkedStates = {};
let currentView = 'self';
let compareWith = null;
let syncId = null;
let unsubscribe = null;
let isOnline = false;
let openSections = new Set();
let currentFilter = 'all';
let expanded = false;
let modoQuitar = false;

function loadLocal() {
  const saved = localStorage.getItem(KEY_LOCAL);
  if (saved) {
    try {
      selfState = JSON.parse(saved);
      state = { ...selfState };
    } catch(e) {}
  }
}
function saveLocal() { localStorage.setItem(KEY_LOCAL, JSON.stringify(selfState)); }
const get = (id, st) => (st || state)[id] || 0;
function set(id, v) {
  if (currentView !== 'self') {
    toast('⚠️ Solo puedes modificar tu propio álbum');
    return;
  }
  if (v === 0) delete selfState[id]; else selfState[id] = v;
  saveLocal();
  if (isOnline) pushToCloud();
}

async function initSync() {
  syncId = localStorage.getItem(SYNC_ID_KEY);
  if (!syncId) {
    syncId = generateCode();
    localStorage.setItem(SYNC_ID_KEY, syncId);
  }
  document.getElementById('syncCode').textContent = syncId;
  auth.signInAnonymously().then(() => {
    listenToCloud();
  }).catch(e => {
    setSyncStatus(false);
    document.getElementById('syncText').textContent = 'Error auth: ' + e.message;
  });
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function listenToCloud() {
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection('albums').doc(syncId)
    .onSnapshot(doc => {
      if (doc.exists) {
        const cloudState = doc.data().stickers || {};
        selfState = { ...selfState, ...cloudState };
        saveLocal();
        if (currentView === 'self') state = { ...selfState };
        render();
        setSyncStatus(true);
      } else {
        pushToCloud();
        setSyncStatus(true);
      }
    }, () => setSyncStatus(false));
}

function pushToCloud() {
  if (!syncId) return;
  db.collection('albums').doc(syncId).set({
    stickers: selfState,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true }).catch(e => console.error('Error al subir:', e));
}

function setSyncStatus(online) {
  isOnline = online;
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot ' + (online ? 'online' : 'offline');
  text.textContent = online ? 'Conectado' : 'Sin conexión';
}

async function linkDevice() {
  const code = document.getElementById('linkCode').value.trim().toUpperCase();
  if (!code || code.length<4) { toast('⚠️ Código inválido'); return; }
  if (code === syncId) { toast('⚠️ Ese es tu propio código'); return; }
  
  closeModal('modalLink');
  let linked = JSON.parse(localStorage.getItem(LINKED_KEY)||'[]');
  if (!linked.includes(code)) {
    linked.push(code);
    localStorage.setItem(LINKED_KEY, JSON.stringify(linked));
  }
  await loadLinkedAlbum(code);
  updateViewSelector();
  if (!compareWith) compareWith = code;
  updateMissingFromOtherButton();
}

async function loadLinkedAlbum(code) {
  try {
    const doc = await db.collection('albums').doc(code).get();
    if (doc.exists) {
      linkedStates[code] = doc.data().stickers || {};
    } else {
      linkedStates[code] = {};
      toast('ℹ️ Ese código aún no tiene datos.');
    }
  } catch(e) {
    toast('⚠️ Error al cargar álbum: ' + e.message);
  }
}

function removeLinkedAlbum(code) {
  let linked = JSON.parse(localStorage.getItem(LINKED_KEY)||'[]');
  linked = linked.filter(c => c !== code);
  localStorage.setItem(LINKED_KEY, JSON.stringify(linked));
  delete linkedStates[code];
  if (currentView === code) {
    currentView = 'self';
    state = { ...selfState };
  }
  if (compareWith === code) {
    const remaining = Object.keys(linkedStates);
    compareWith = remaining.length > 0 ? remaining[0] : null;
  }
  updateViewSelector();
  render();
  toast('🗑️ Vinculación eliminada');
}

function updateViewSelector() {
  const sel = document.getElementById('viewSelect');
  sel.innerHTML = '<option value="self">Mi álbum</option>';
  const linked = JSON.parse(localStorage.getItem(LINKED_KEY)||'[]');
  linked.forEach(code => {
    const exists = linkedStates[code] !== undefined;
    sel.innerHTML += `<option value="${code}">Álbum ${code} ${exists ? '' : '(sin datos)'}</option>`;
  });
  if (currentView === 'self') {
    sel.value = 'self';
  } else if (linkedStates[currentView]) {
    sel.value = currentView;
  }
  const btnUnlink = document.getElementById('btnUnlink');
  if (currentView !== 'self') {
    btnUnlink.style.display = 'inline-block';
    btnUnlink.onclick = () => removeLinkedAlbum(currentView);
  } else {
    btnUnlink.style.display = 'none';
  }
  updateMissingFromOtherButton();
}

document.getElementById('viewSelect').addEventListener('change', function(e) {
  const val = e.target.value;
  if (val === 'self') {
    currentView = 'self';
    state = { ...selfState };
  } else {
    currentView = val;
    state = { ...(linkedStates[val] || {}) };
    compareWith = val;
  }
  render();
  updateMatchBadge();
});

function updateMatchBadge() {
  const badge = document.getElementById('matchBadge');
  if (currentView !== 'self' && linkedStates[currentView]) {
    const other = linkedStates[currentView];
    let matches = 0;
    for (let id in selfState) {
      if (selfState[id] === 2 && other[id] === 2) matches++;
    }
    badge.textContent = `🔁 ${matches} repetidos en común`;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

function updateMissingFromOtherButton() {
  const btn = document.getElementById('btnMissingFromOther');
  const hasLinked = Object.keys(linkedStates).length > 0;
  btn.disabled = !hasLinked;
  btn.title = hasLinked ? '' : 'Vincula otro álbum primero';
}

function toggleWish(id) {
  if (currentView === 'self') return;
  let wished = JSON.parse(localStorage.getItem('panini-wished')||'[]');
  const idx = wished.indexOf(id);
  if (idx >= 0) {
    wished.splice(idx,1);
    toast('❌ Pedido cancelado');
  } else {
    wished.push(id);
    toast('✏️ Cromo pedido');
  }
  localStorage.setItem('panini-wished', JSON.stringify(wished));
  render();
}

const FLAGS = {
  'MEX':'mx','RSA':'za','KOR':'kr','CZE':'cz','CAN':'ca','BIH':'ba','QAT':'qa','SUI':'ch',
  'BRA':'br','MAR':'ma','HAI':'ht','SCO':'gb-sct','USA':'us','PAR':'py','AUS':'au','TUR':'tr',
  'GER':'de','CUW':'cw','CIV':'ci','ECU':'ec','NED':'nl','JPN':'jp','SWE':'se','TUN':'tn',
  'BEL':'be','EGY':'eg','IRN':'ir','NZL':'nz','ESP':'es','CPV':'cv','KSA':'sa','URU':'uy',
  'FRA':'fr','SEN':'sn','IRQ':'iq','NOR':'no','ARG':'ar','ALG':'dz','AUT':'at','JOR':'jo',
  'POR':'pt','COD':'cd','UZB':'uz','COL':'co','ENG':'gb-eng','CRO':'hr','GHA':'gh','PAN':'pa'
};

function T(code, name, grupo, p1a11, p14a20) {
  const stickers = [{ id: code + '1', label: 'BADGE' }];
  p1a11.forEach((p, i) => stickers.push({ id: code + (i + 2), label: p.toUpperCase() }));
  stickers.push({ id: code + '13', label: 'SQUAD', isPhoto: true });
  p14a20.forEach((p, i) => stickers.push({ id: code + (i + 14), label: p.toUpperCase() }));
  return { code, name, flag: getFlagUrl(code), grupo, stickers };
}
