<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recuperar mis cromos</title>
<style>
  body { background:#0a0e1a; color:#e2e8f0; font-family:sans-serif; padding:20px; }
  button { background:#e8b84b; color:#000; border:none; padding:12px 24px; font-size:1rem; border-radius:8px; cursor:pointer; }
  textarea { width:100%; height:200px; margin:10px 0; background:#1a2235; color:#e2e8f0; border:1px solid #243050; border-radius:8px; padding:10px; font-family:monospace; }
  .hidden { display:none; }
</style>
</head>
<body>
<h1>🩹 Recuperar mis cromos</h1>
<p>Pulsa el botón para buscar tus cromos guardados en este iPhone.</p>
<button onclick="buscar()">🔎 Buscar mis cromos</button>

<div id="resultado" class="hidden">
  <p><strong>Tus cromos encontrados:</strong></p>
  <textarea id="datos" readonly></textarea>
  <button onclick="descargar()">⬇️ Descargar archivo album.json</button>
</div>

<script>
function buscar() {
  const claves = ['panini-wc26-v9', 'panini-wc26-v8', 'panini-wc26', 'panini-wc26-sync'];
  let datos = null;
  for (let k of claves) {
    const val = localStorage.getItem(k);
    if (val) {
      try {
        datos = JSON.parse(val);
        break;
      } catch(e) {}
    }
  }
  if (datos) {
    document.getElementById('datos').value = JSON.stringify(datos, null, 2);
    document.getElementById('resultado').classList.remove('hidden');
  } else {
    alert('No se encontraron cromos guardados. Asegúrate de abrir esta página desde el mismo navegador donde usabas el álbum.');
  }
}

function descargar() {
  const texto = document.getElementById('datos').value;
  const blob = new Blob([texto], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'album.json';
  a.click();
}
</script>
</body>
</html>
